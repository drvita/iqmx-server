<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="gradBot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background: Rounded square with the original gradient -->
  <rect width="32" height="32" rx="8" fill="url(#gradBot)"/>
  
  <!-- Antenna -->
  <line x1="16" y1="11" x2="16" y2="7" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="16" cy="6" r="1.5" fill="white"/>

  <!-- Robot Head -->
  <rect x="8" y="11" width="16" height="13" rx="3" fill="white"/>
  
  <!-- Face Details -->
  <!-- Eyes -->
  <circle cx="12" cy="16" r="2" fill="#3b82f6"/>
  <circle cx="20" cy="16" r="2" fill="#3b82f6"/>
  
  <!-- Smile -->
  <path d="M 12 20 Q 16 22 20 20" stroke="#3b82f6" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
