<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#grad1)"/>
  
  <!-- Robot head -->
  <rect x="10" y="11" width="12" height="10" rx="2" fill="white" opacity="0.95"/>
  
  <!-- Eyes -->
  <circle cx="13" cy="15" r="1.5" fill="#3b82f6"/>
  <circle cx="19" cy="15" r="1.5" fill="#3b82f6"/>
  
  <!-- Smile -->
  <path d="M 13 18 Q 16 19.5 19 18" stroke="#3b82f6" stroke-width="1" fill="none" stroke-linecap="round"/>
  
  <!-- Antenna -->
  <line x1="16" y1="11" x2="16" y2="8" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.95"/>
  <circle cx="16" cy="7" r="1.5" fill="white" opacity="0.95"/>
  
  <!-- Gear left -->
  <g transform="translate(8, 24)">
    <circle cx="0" cy="0" r="3" fill="white" opacity="0.9"/>
    <circle cx="0" cy="0" r="1.5" fill="#06b6d4"/>
    <rect x="-0.5" y="-4" width="1" height="2" fill="white" opacity="0.9"/>
    <rect x="-0.5" y="2" width="1" height="2" fill="white" opacity="0.9"/>
    <rect x="-4" y="-0.5" width="2" height="1" fill="white" opacity="0.9"/>
    <rect x="2" y="-0.5" width="2" height="1" fill="white" opacity="0.9"/>
  </g>
  
  <!-- Gear right -->
  <g transform="translate(24, 24)">
    <circle cx="0" cy="0" r="3" fill="white" opacity="0.9"/>
    <circle cx="0" cy="0" r="1.5" fill="#8b5cf6"/>
    <rect x="-0.5" y="-4" width="1" height="2" fill="white" opacity="0.9"/>
    <rect x="-0.5" y="2" width="1" height="2" fill="white" opacity="0.9"/>
    <rect x="-4" y="-0.5" width="2" height="1" fill="white" opacity="0.9"/>
    <rect x="2" y="-0.5" width="2" height="1" fill="white" opacity="0.9"/>
  </g>
</svg>
