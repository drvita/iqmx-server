services:
  webhook:
    build:
      context: ./webhook
      dockerfile: Dockerfile
    container_name: iqmx-webhook
    restart: always
    networks:
      - default
      - coolify
    depends_on:
      - api
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - ENVIRONMENT=production
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - RATE_LIMIT_PER_SECOND=${RATE_LIMIT_PER_SECOND:-35}
      - WHATSAPP_VERIFY_TOKEN=${WHATSAPP_VERIFY_TOKEN}
      - META_APP_SECRET=${META_APP_SECRET}
      - API_URL=http://api:8000

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: iqmx-api
    restart: always
    networks:
      - default
      - coolify
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - ENVIRONMENT=production
      - DATABASE_TYPE=${DATABASE_TYPE:-sqlite}
      - SQLITE_DB_PATH=${SQLITE_DB_PATH:-./whatsapp_events.db}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: iqmx-web
    restart: always
    networks:
      - default
      - coolify
    depends_on:
      - api
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - API_URL=http://api:8000

networks:
  coolify:
    external: true
